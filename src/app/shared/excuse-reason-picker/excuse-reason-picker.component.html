<ion-modal #modal [breakpoints]="[0, 0.6, 1]" [initialBreakpoint]="0.6" (didDismiss)="onDidDismiss()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-buttons slot="start">
          <ion-button (click)="dismiss()" aria-label="Abbrechen">
            <ion-icon slot="icon-only" name="close"></ion-icon>
          </ion-button>
        </ion-buttons>
        <ion-title>{{ isLate ? 'Verspätung' : 'Abmeldung' }}</ion-title>
        <ion-buttons slot="end">
          <ion-button strong="true" [disabled]="!isConfirmable()" (click)="onConfirm()" aria-label="Bestätigen">
            <ion-icon slot="icon-only" name="checkmark"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
      <ion-radio-group [(ngModel)]="reasonSelection" (ionChange)="onReasonChange()">
        <ion-list lines="full">
          @for (reason of reasons; track reason) {
          <ion-item>
            <ion-radio justify="start" labelPlacement="end" [value]="reason">{{ reason }}</ion-radio>
          </ion-item>
          }
          <ion-item>
            <ion-radio justify="start" labelPlacement="end" [value]="customReasonValue">Sonstiger Grund (Text)</ion-radio>
          </ion-item>
        </ion-list>
      </ion-radio-group>

      @if (reasonSelection === customReasonValue) {
      <ion-item class="custom-reason" #customReasonField>
        <ion-label position="stacked">Grund</ion-label>
        <ion-textarea [(ngModel)]="customReason" placeholder="Mindestens 5 Zeichen eingeben..."
          autoGrow="true"></ion-textarea>
      </ion-item>
      <div class="keyboard-spacer"></div>
      }
    </ion-content>
  </ng-template>
</ion-modal>
